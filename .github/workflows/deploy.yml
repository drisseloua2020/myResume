name: CI-CD

on:
  push:
    branches: [main, stage]

permissions:
  contents: read

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify project layout
        run: |
          test -f services/requirements.txt
          test -f services/pytest.ini
          test -f ui/package.json
          test -f ui/package-lock.json

  backend-e2e-test:
    name: Backend E2E Test
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/requirements.txt

      - name: Install backend deps
        run: |
          cd services
          python -m pip install -r requirements.txt

      - name: Run backend API E2E tests
        run: |
          cd services
          python -m pytest

  ui-test:
    name: UI Test
    runs-on: ubuntu-latest
    needs: backend-e2e-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: |
          cd ui
          npm ci

      - name: Run UI unit tests
        run: |
          cd ui
          npm test

      - name: Build UI
        run: |
          cd ui
          npm run build

  appsec-check:
    name: AppSec Check
    runs-on: ubuntu-latest
    needs: ui-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install AppSec tools and project deps
        run: |
          cd services
          python -m pip install -r requirements.txt
          python -m pip install semgrep pip-audit
          cd ../ui
          npm ci

      - name: SAST - Semgrep
        run: |
          semgrep scan --config p/ci --error --exclude ui/node_modules --exclude ui/dist .

      - name: SCA - Python dependency audit
        run: |
          cd services
          pip-audit -r requirements.txt

      - name: SCA - npm dependency audit
        run: |
          cd ui
          npm audit --audit-level=high

      - name: Start backend for DAST
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+pysqlite:///./appsec.db
          JWT_SECRET: appsec-secret
        run: |
          cd services
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 3000 > appsec-api.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3000/health && exit 0
            sleep 2
          done
          cat appsec-api.log
          exit 1

      - name: DAST - OWASP ZAP baseline
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://127.0.0.1:3000"
          fail_action: true
          allow_issue_writing: false
          cmd_options: "-I -m 5 -T 5"

  deployment:
    name: Deployment
    runs-on: ubuntu-latest
    needs: appsec-check

    steps:
      - name: Deploy Backend to Render
        run: curl -X POST ${{ secrets.RENDER_API_DEPLOY_HOOK }}

      - name: Deploy UI to Render
        run: curl -X POST ${{ secrets.RENDER_UI_DEPLOY_HOOK }}
