name: CI-CD

on:
  push:
    branches: [main, stage]

permissions:
  contents: read

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify project layout
        run: |
          test -f services/requirements.txt
          test -f services/pytest.ini
          test -f ui/package.json
          test -f ui/package-lock.json

  backend-e2e-test:
    name: Backend E2E Test
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/requirements.txt

      - name: Install backend deps
        run: |
          cd services
          python -m pip install -r requirements.txt

      - name: Run backend API E2E tests
        run: |
          cd services
          python -m pytest

  ui-test:
    name: UI Test
    runs-on: ubuntu-latest
    needs: backend-e2e-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: |
          cd ui
          npm ci

      - name: Run UI unit tests
        run: |
          cd ui
          npm test

      - name: Build UI
        run: |
          cd ui
          npm run build

  deployment:
    name: Deployment
    runs-on: ubuntu-latest
    needs: ui-test

    steps:
      - name: Deploy Backend to Render
        run: curl -X POST ${{ secrets.RENDER_API_DEPLOY_HOOK }}

      - name: Deploy UI to Render
        run: curl -X POST ${{ secrets.RENDER_UI_DEPLOY_HOOK }}
